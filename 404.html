<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page Not Found | Fluxora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#007AFF',secondary:'#FF2D55'},borderRadius:{button:'10px'}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(44,44,46,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; backdrop-filter: blur(20px); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="glass p-12 text-center max-w-md mx-4">
    <div class="text-7xl font-extrabold mb-4" style="background:linear-gradient(135deg,#0A84FF,#5E5CE6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">404</div>
    <h1 class="text-xl font-bold mb-3">Page Not Found</h1>
    <p class="text-base mb-8" style="color:rgba(235,235,245,0.55)">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="inline-block bg-primary text-white px-8 py-3 rounded-button font-semibold no-underline hover:opacity-90 transition-opacity">Back to Home</a>
  </div>
</body>
</html>
